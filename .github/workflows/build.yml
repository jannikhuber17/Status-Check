name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Qt5 installieren
        shell: pwsh
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop 5.15.2 win64_msvc2019_64 --outputdir C:\Qt
          Add-Content $env:GITHUB_ENV "Qt5_DIR=C:/Qt/5.15.2/msvc2019_64/lib/cmake/Qt5"
          Add-Content $env:GITHUB_PATH "C:/Qt/5.15.2/msvc2019_64/bin"

      - name: MSVC x64 einrichten
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: CMake konfigurieren
        run: cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="C:/Qt/5.15.2/msvc2019_64"

      - name: Plugin bauen
        run: cmake --build build --target package_ts3plugin

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: plugin-windows
          path: build/staffel_viper_readycheck.ts3_plugin
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Qt5 installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y qtbase5-dev libqt5websockets5-dev

      - name: CMake konfigurieren
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Plugin bauen
        run: cmake --build build --target package_ts3plugin

      - name: Paket umbenennen
        run: mv build/staffel_viper_readycheck.ts3_plugin build/staffel_viper_readycheck_linux.ts3_plugin

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: plugin-linux
          path: build/staffel_viper_readycheck_linux.ts3_plugin
          if-no-files-found: error

  release:
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Windows-Artefakt laden
        uses: actions/download-artifact@v4
        with:
          name: plugin-windows
          path: artifacts/windows

      - name: Linux-Artefakt laden
        uses: actions/download-artifact@v4
        with:
          name: plugin-linux
          path: artifacts/linux

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows/staffel_viper_readycheck.ts3_plugin
            artifacts/linux/staffel_viper_readycheck_linux.ts3_plugin
          generate_release_notes: true
          name: "Status Check ${{ github.ref_name }}"
