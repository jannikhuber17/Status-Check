name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Qt5 installieren
        shell: pwsh
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop 5.15.2 win64_msvc2019_64 --outputdir C:\Qt
          Add-Content $env:GITHUB_ENV "Qt5_DIR=C:/Qt/5.15.2/msvc2019_64/lib/cmake/Qt5"
          Add-Content $env:GITHUB_PATH "C:/Qt/5.15.2/msvc2019_64/bin"

      - name: MSVC x64 einrichten
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: CMake konfigurieren
        run: cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="C:/Qt/5.15.2/msvc2019_64"

      - name: Plugin bauen
        run: cmake --build build --target package_ts3plugin

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: status-check-plugin
          path: build/staffel_viper_readycheck.ts3_plugin
          if-no-files-found: error

      - name: GitHub Release erstellen
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/staffel_viper_readycheck.ts3_plugin
          generate_release_notes: true
          name: "Status Check ${{ github.ref_name }}"
