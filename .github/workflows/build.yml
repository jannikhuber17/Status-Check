name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Qt5 installieren
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: CMake konfigurieren
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Plugin bauen
        run: cmake --build build --config Release --target package_ts3plugin

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: status-check-plugin
          path: build/staffel_viper_readycheck.ts3_plugin
          if-no-files-found: error

      - name: GitHub Release erstellen
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/staffel_viper_readycheck.ts3_plugin
          generate_release_notes: true
          name: "Status Check ${{ github.ref_name }}"
